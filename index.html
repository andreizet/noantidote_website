<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Antidote — Official Website</title>
  <meta name="description" content="Cine e trupa No Antidote? E pastila ta zilnică de Alternative Rock." />
  <meta name="author" content="No Antidote" />
  <!-- Index only on the production domain. On the github.io URL, previews,
       and localhost this injects noindex so they never get indexed. -->
  <script>
    (function () {
      var production = ["noantidote.ro", "www.noantidote.ro"];
      if (production.indexOf(location.hostname) === -1) {
        var m = document.createElement("meta");
        m.name = "robots";
        m.content = "noindex, nofollow";
        document.head.appendChild(m);
      }
    })();
  </script>
  <meta name="theme-color" content="#050308" />
  <link rel="canonical" href="https://noantidote.ro/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="No Antidote" />
  <meta property="og:title" content="No Antidote — Official Website" />
  <meta property="og:description" content="No Antidote. Ascultă. Privește. Ne vedem live." />
  <meta property="og:url" content="https://noantidote.ro/" />
  <meta property="og:image" content="https://noantidote.ro/assets/background.jpg" />
  <meta property="og:image:width" content="2400" />
  <meta property="og:image:height" content="1350" />
  <meta property="og:image:alt" content="No Antidote" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="No Antidote — Official Website" />
  <meta name="twitter:description" content="No Antidote. Ascultă. Privește. Ne vedem live." />
  <meta name="twitter:image" content="https://noantidote.ro/assets/background.jpg" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Structured data: helps search engines link the band to its profiles -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "No Antidote",
    "genre": "Alternative Rock",
    "url": "https://noantidote.ro/",
    "image": "https://noantidote.ro/assets/background.jpg",
    "email": "noantidoteofficial@gmail.com",
    "telephone": "+40770319277",
    "sameAs": [
      "https://open.spotify.com/artist/6SVBYtAtx5Vbnvcjf0PuCt",
      "https://music.apple.com/us/artist/no-antidote/1246919769",
      "https://music.youtube.com/channel/UC0rUVMYEONrqq9lCu0lV-Fg",
      "https://www.youtube.com/@NoAntidoteOfficial",
      "https://tidal.com/artist/7490857",
      "https://www.deezer.com/us/artist/9595022",
      "https://www.instagram.com/noantidoteofficial/",
      "https://www.facebook.com/noantidoteband/",
      "https://www.tiktok.com/@no.antidote_tikto"
    ]
  }
  </script>
</head>
<body>
  <!-- Fixed parallax background layers -->
  <div class="bg-layer bg-image" aria-hidden="true"></div>
  <div class="bg-layer bg-vignette" aria-hidden="true"></div>

  <main>
    <!-- 1. HERO / COUNTDOWN -->
    <section class="section hero" id="hero">
      <div class="hero-inner parallax" data-speed="0.05">
        <h1 class="logo-heading">
          <img class="logo" src="assets/logo-white.svg" alt="No Antidote" />
        </h1>

        <!-- Countdown (hidden & replaced by video once it hits zero) -->
        <div class="countdown" id="countdown" aria-live="polite">
          <div class="cd-unit"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Zile</span></div>
          <div class="cd-sep">:</div>
          <div class="cd-unit"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Ore</span></div>
          <div class="cd-sep">:</div>
          <div class="cd-unit"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Minute</span></div>
          <div class="cd-sep">:</div>
          <div class="cd-unit"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Secunde</span></div>
        </div>

        <!-- Tagline under the countdown -->
        <img class="tagline" src="assets/vezi_ce_spui.svg" alt="Vezi ce spui" />

        <!-- Video (revealed once countdown finishes) -->
        <div class="video-wrap" id="video-wrap" hidden>
          <div class="video-frame" id="video-frame"><!-- iframe injected by script.js --></div>
        </div>
      </div>

      <a class="scroll-hint" href="#listen" aria-label="Scroll down">
        <span></span>
      </a>
    </section>

    <!-- 2. LISTEN / STREAMING -->
    <section class="section listen" id="listen">
      <div class="content parallax" data-speed="0.05">
        <h2 class="section-title">Listen</h2>
        <ul class="streaming" id="streaming"><!-- links injected by script.js --></ul>
      </div>
    </section>

    <!-- 3. SOCIAL -->
    <section class="section social" id="social-section">
      <div class="content parallax" data-speed="0.05">
        <h2 class="section-title">Follow</h2>
        <ul class="social-list" id="social"><!-- links injected by script.js --></ul>
      </div>
    </section>

    <!-- 4. BOOKING -->
    <section class="section booking" id="booking">
      <div class="content parallax" data-speed="0.05">
        <h2 class="section-title">Booking</h2>
        <div class="contact">
          <a class="contact-link" id="phone-link" href="#">
            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path fill="currentColor" d="M6.62 10.79a15.53 15.53 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.36 11.36 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.57a1 1 0 0 1-.25 1.02l-2.2 2.2Z"/>
            </svg>
            <span id="phone-text">+40 770 319 277</span>
          </a>
          <a class="contact-link" id="email-link" href="#">
            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path fill="currentColor" d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v.4l8 5 8-5V6H4Zm16 2.8-7.47 4.67a1 1 0 0 1-1.06 0L4 8.8V18h16V8.8Z"/>
            </svg>
            <span id="email-text">noantidoteofficial@gmail.com</span>
          </a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <img class="footer-logo" src="assets/logo-white.svg" alt="NO ANTIDOTE" />
      <p>&copy; <span id="year"></span> NO ANTIDOTE</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
